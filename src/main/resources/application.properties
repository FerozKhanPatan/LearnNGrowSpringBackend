# Server Configuration
server.port=8080

# Database Configuration - Render PostgreSQL
# Replace with your actual Render database credentials
spring.datasource.url=jdbc:postgresql://YOUR_RENDER_HOST:5432/YOUR_DATABASE_NAME?sslmode=require
spring.datasource.username=YOUR_RENDER_USERNAME
spring.datasource.password=YOUR_RENDER_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=elearningplatformsecretkey2024verysecure
jwt.expiration=86400000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,https://www.learnnbyte.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
